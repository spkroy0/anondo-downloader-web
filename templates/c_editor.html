<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo Pro C IDE - PDF Export</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0b0f1a; --panel: #161b22; --accent: #58a6ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        @keyframes rgbText {
            0% { color: #ff0000; } 33% { color: #00ff00; } 66% { color: #0000ff; } 100% { color: #ff0000; }
        }
        .rgb-title { font-weight: bold; font-size: 16px; animation: rgbText 3s infinite linear; }

        .header { background: var(--panel); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        
        .btn-group { display: flex; gap: 8px; }
        .run-btn { background: #238636; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .pdf-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .quick-tools { background: #21262d; padding: 5px 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #30363d; }
        .tool-btn { background: #30363d; color: white; border: none; padding: 5px 12px; border-radius: 4px; font-family: monospace; cursor: pointer; }

        /* PDF Export Section */
        #pdf-content { display: flex; flex: 1; overflow: hidden; background: #0b0f1a; }
        @media (max-width: 768px) { #pdf-content { flex-direction: column; } }

        #editor { flex: 1.5; font-size: 15px; border-right: 1px solid #30363d; height: 100%; }
        
        .output-section { flex: 1; display: flex; flex-direction: column; background: #000; color: #fff; }
        .output-header { background: #161b22; padding: 8px; font-size: 12px; color: #8b949e; border-bottom: 1px solid #30363d; }
        #output { flex: 1; padding: 15px; font-family: 'Fira Code', monospace; font-size: 14px; overflow-y: auto; white-space: pre-wrap; margin: 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="rgb-title">C EDITOR BY ANONDO</div>
    <div class="btn-group">
        <button class="run-btn" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
        <button class="pdf-btn" onclick="saveAsPDF()"><i class="fas fa-file-pdf"></i> SAVE PDF</button>
    </div>
</div>

<div class="quick-tools">
    <button class="tool-btn" onclick="insertText('#include <stdio.h>\n')">#inc</button>
    <button class="tool-btn" onclick="insertText('int main() {\n\n    return 0;\n}')">main</button>
    <button class="tool-btn" onclick="insertText('printf(\"\");')">print</button>
    <button class="tool-btn" onclick="insertText('scanf(\"\");')">scan</button>
    <button class="tool-btn" onclick="insertText(';')">;</button>
    <button class="tool-btn" onclick="insertText('{')">{</button>
    <button class="tool-btn" onclick="insertText('}')">}</button>
</div>

<div class="main-container" id="pdf-content">
    <div id="editor">#include <stdio.h>

int main() {
    printf("Anondo Kumar Roy's C IDE\n");
    printf("Code and Output can be saved as PDF!\n");
    return 0;
}</div>

    <div class="output-section">
        <div class="output-header">CONSOLE OUTPUT</div>
        <pre id="output">Run the code to see output...</pre>
    </div>
</div>

<script>
    var editor = ace.edit("editor");
    editor.setTheme("ace/theme/one_dark");
    editor.session.setMode("ace/mode/c_cpp");
    editor.setShowPrintMargin(false);

    function insertText(text) {
        editor.insert(text);
        editor.focus();
    }

    async function runCode() {
        const code = editor.getValue();
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML = '<span style="color: #58a6ff;">Running...</span>';

        try {
            const response = await fetch('https://emkc.org/api/v2/piston/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "language": "c",
                    "version": "10.2.0",
                    "files": [{ "content": code }]
                })
            });
            const data = await response.json();
            outputDiv.innerText = data.run.output || data.run.stderr;
        } catch (error) {
            outputDiv.innerText = "Error!";
        }
    }

    // --- PDF Export Logic ---
    function saveAsPDF() {
        const element = document.getElementById('pdf-content');
        const opt = {
            margin:       0.5,
            filename:     'Anondo_C_Code.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, backgroundColor: '#0b0f1a' },
            jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };

        // PDF তৈরির আগে এডিটরের হাইট সেট করে নেওয়া যাতে পুরো কোড আসে
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
