<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo AI | Prompt Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b1120; color: white; margin: 0; padding-bottom: 50px; }
        header { text-align: center; padding: 50px 20px; background: linear-gradient(135deg, #1e293b 0%, #0b1120 100%); border-bottom: 1px solid #334155; }
        header h1 { font-size: 28px; color: #38bdf8; margin: 0; }
        header p { color: #94a3b8; font-size: 14px; margin: 10px 0 25px; }
        
        .back-btn { color: #cbd5e1; text-decoration: none; font-size: 13px; padding: 8px 18px; border-radius: 20px; background: #0f172a; border: 1px solid #334155; }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .card { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .card img { width: 100%; height: 250px; object-fit: cover; display: block; }
        
        .card-content { padding: 15px; }
        .card-title { font-size: 16px; font-weight: 600; color: #f8fafc; margin-bottom: 12px; }
        
        .prompt-box { background: #0f172a; padding: 12px; border-radius: 12px; font-size: 12px; color: #94a3b8; position: relative; border: 1px solid #334155; }
        .prompt-text { display: block; margin-right: 45px; line-height: 1.4; height: 35px; overflow: hidden; }
        
        .copy-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: #38bdf8; border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; color: #0b1120; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .copy-btn:active { transform: translateY(-50%) scale(0.9); }

        #toast { visibility: hidden; min-width: 150px; background: #10b981; color: white; text-align: center; border-radius: 25px; padding: 10px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 13px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-bolt"></i> AI Prompt Gallery</h1>
    <p>Explore & Copy High-Quality AI Image Prompts</p>
    <a href="https://anondo.bro.bd" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
</header>

<div class="container">
    {% for image in images %}
    <div class="card">
        <img src="{{ image.image_url }}" alt="{{ image.title }}">
        <div class="card-content">
            <div class="card-title">{{ image.title }}</div>
            <div class="prompt-box">
                <span class="prompt-text" id="{{ image.id }}">{{ image.prompt }}</span>
                <button class="copy-btn" onclick="copyPrompt('{{ image.id }}')"><i class="fas fa-copy"></i></button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<div id="toast">Prompt Copied!</div>

<script>
    function copyPrompt(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        });
    }
</script>

</body>
</html>
